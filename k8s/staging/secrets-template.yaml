apiVersion: v1
kind: Secret
metadata:
  name: cloudcommander-secrets
  namespace: cloudcommander-staging
type: Opaque
stringData:
  DATABASE_URL: "postgresql://USER:PASSWORD@managed-postgres.example.com:5432/cloudcommander_staging?sslmode=require"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudcommander-config
  namespace: cloudcommander-staging
data:
  ADAPTER_BASE_URL: "https://staging-adapter-gateway.example.internal"
