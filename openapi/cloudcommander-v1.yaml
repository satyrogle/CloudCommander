openapi: 3.0.3
info:
  title: CloudCommander API
  version: 1.0.0
  description: |
    Command/Query API for deterministic CloudCommander core.
servers:
  - url: https://api.cloudcommander.example.com
security:
  - bearerAuth: []
paths:
  /api/v1/commands/resource-allocation:
    post:
      summary: Request resource allocation mutation
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Idempotency-Key
          required: true
          schema:
            type: string
        - in: header
          name: X-Expected-Version
          required: true
          schema:
            type: integer
            minimum: 0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceAllocationCommand'
      responses:
        '202':
          description: Accepted and appended to event log
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Validation failure or non-finite numeric input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMap'
        '409':
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMap'
        '423':
          description: Aggregate is frozen due to detected external drift
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMap'
  /api/v1/commands/dependency-edge:
    post:
      summary: Propose dependency edge insertion
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Idempotency-Key
          required: true
          schema:
            type: string
        - in: header
          name: X-Expected-Version
          required: true
          schema:
            type: integer
            minimum: 0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DependencyEdgeCommand'
      responses:
        '202':
          description: Accepted and appended to event log
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMap'
        '423':
          description: Aggregate is frozen due to detected external drift
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMap'
        '409':
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMap'
        '423':
          description: Aggregate is frozen due to detected external drift
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMap'
        '422':
          description: Cycle detected; DAG constraint violated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMap'
  /api/v1/commands/rollback:
    post:
      summary: Initiate rollback to sequence or snapshot
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollbackCommand'
      responses:
        '202':
          description: Rollback accepted and queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMap'
  /api/v1/projections/service-graph:
    get:
      summary: Get validated DAG projection
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current service graph projection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceGraphProjection'
  /api/v1/projections/nodes/{node_id}:
    get:
      summary: Get projected node lifecycle state
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: node_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Projected node detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNodeProjection'
        '404':
          description: Node not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMap'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CommandEnvelope:
      type: object
      required: [tenant_id, actor_id]
      properties:
        tenant_id:
          type: string
        actor_id:
          type: string
    ResourceAllocationCommand:
      allOf:
        - $ref: '#/components/schemas/CommandEnvelope'
        - type: object
          required: [node_id, target_cpu_millicores, target_memory_mib, reason_code]
          properties:
            node_id:
              type: string
            target_cpu_millicores:
              type: integer
              minimum: 1
              maximum: 1048576
            target_memory_mib:
              type: integer
              minimum: 1
              maximum: 8388608
            reason_code:
              type: string
    DependencyEdgeCommand:
      allOf:
        - $ref: '#/components/schemas/CommandEnvelope'
        - type: object
          required: [source_node_id, target_node_id]
          properties:
            source_node_id:
              type: string
            target_node_id:
              type: string
            edge_constraints:
              type: object
              additionalProperties: true
    RollbackCommand:
      allOf:
        - $ref: '#/components/schemas/CommandEnvelope'
        - type: object
          properties:
            target_sequence_id:
              type: integer
              minimum: 0
            snapshot_ref:
              type: string
          oneOf:
            - required: [target_sequence_id]
            - required: [snapshot_ref]
    EventResponse:
      type: object
      required: [event_id, status]
      properties:
        event_id:
          type: string
        status:
          type: string
          enum: [accepted, pending, applied, failed]
        sequence_id:
          type: integer
          minimum: 0
    ErrorMap:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [validation_error, conflict_error, dag_cycle_error, routing_error, not_found, aggregate_frozen]
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    ServiceGraphProjection:
      type: object
      properties:
        tenant_id:
          type: string
        version:
          type: integer
          minimum: 0
        nodes:
          type: array
          items:
            type: string
        edges:
          type: array
          items:
            type: object
            required: [source, target]
            properties:
              source:
                type: string
              target:
                type: string
    ResourceNodeProjection:
      type: object
      required: [node_id, lifecycle_state]
      properties:
        node_id:
          type: string
        lifecycle_state:
          type: string
          enum: [active, orphaned, tombstoned]
        version:
          type: integer
          minimum: 0
